<header class="flex items-center gap-2 px-4 md:px-6 h-14 shrink-0 relative"
        style="background:var(--bg-surface);border-bottom:1px solid var(--border);">

  <button id="hamburger" onclick="toggleMobileSidebar()"
          class="md:hidden p-1 rounded-md shrink-0" style="color:var(--text-secondary);">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
    </svg>
  </button>

  <h1 class="text-[15px] font-semibold shrink-0" style="color:var(--text-primary);">{{ page_title }}</h1>

  <div class="ml-auto flex items-center gap-2 shrink-0">

    <a href="/notifications"
       class="relative inline-flex items-center justify-center w-8 h-8 rounded-md"
       style="color:var(--text-secondary);background:var(--bg-input);border:1px solid var(--border);">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
      </svg>
      <span class="absolute top-1 right-1 w-1.5 h-1.5 rounded-full bg-blue-500"></span>
    </a>

    <button onclick="toggleTheme()" id="themeToggle"
            class="flex items-center justify-center w-8 h-8 rounded-md"
            style="color:var(--text-secondary);background:var(--bg-input);border:1px solid var(--border);">
      <svg id="iconSun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
      </svg>
      <svg id="iconMoon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
      </svg>
    </button>

    <div class="relative">

      <button id="avatarBtn"
              onclick="toggleAvatarDropdown(event)"
              class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold
                     focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-blue-500"
              style="background:#2563eb;">
        {% if user and user.email %}
          {{ user.email[0].upper() }}{{ user.email[1].upper() if user.email|length > 1 else '' }}
        {% else %}
          AU
        {% endif %}
      </button>

      <div id="avatarDropdown"
           class="hidden absolute right-0 top-10 z-50 rounded-xl shadow-lg py-1 w-56"
           style="background:var(--bg-surface);border:1px solid var(--border);">

        <div class="px-4 py-3" style="border-bottom:1px solid var(--border);">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold shrink-0"
                 style="background:#2563eb;">
              {% if user and user.email %}
                {{ user.email[0].upper() }}
              {% else %}
                A
              {% endif %}
            </div>
            <div class="min-w-0">
              <p class="text-sm font-semibold truncate" style="color:var(--text-primary);">
                Admin User
              </p>
              <p class="text-xs truncate" style="color:var(--text-secondary);">
                {% if user and user.email %}
                  {{ user.email }}
                {% else %}
                  admin@quickrent.in
                {% endif %}
              </p>
            </div>
          </div>
        </div>

        <div class="py-1">

          <a href="/settings"
             class="flex items-center gap-2.5 px-4 py-2.5 text-sm transition-colors"
             style="color:var(--text-primary);"
             onmouseover="this.style.background='var(--bg-row)'"
             onmouseout="this.style.background='transparent'">
            <svg class="w-4 h-4 shrink-0" style="color:var(--text-secondary);" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
            Edit Profile
          </a>

          <a href="/settings"
             class="flex items-center gap-2.5 px-4 py-2.5 text-sm transition-colors"
             style="color:var(--text-primary);"
             onmouseover="this.style.background='var(--bg-row)'"
             onmouseout="this.style.background='transparent'">
            <svg class="w-4 h-4 shrink-0" style="color:var(--text-secondary);" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Settings
          </a>

        </div>

        <div style="border-top:1px solid var(--border);" class="py-1">
          <a href="/logout"
             class="flex items-center gap-2.5 px-4 py-2.5 text-sm transition-colors"
             style="color:#dc2626;"
             onmouseover="this.style.background='#fee2e2'"
             onmouseout="this.style.background='transparent'">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
            </svg>
            Sign Out
          </a>
        </div>

      </div>
    </div>
    </div>
</header>
