<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickRent — Login</title>
  <script>window.tailwind={};window.tailwind.config={darkMode:'class'};</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/theme.css"/>
  <script>(function(){const t=localStorage.getItem('qr-theme')||'light';document.documentElement.classList.add(t);})();</script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:var(--bg-page);">

  <div class="w-full max-w-sm px-6">

    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center text-white text-xl font-bold mb-3"
           style="background:#2563eb;">Q</div>
      <h1 class="text-xl font-bold" style="color:var(--text-primary);">QuickRent</h1>
      <p class="text-sm mt-1" style="color:var(--text-secondary);">Sign in to your Quickrent Account</p>
    </div>

    <div class="rounded-2xl p-8" style="background:var(--bg-surface);border:1px solid var(--border);">

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg text-sm font-medium"
           style="background:#fee2e2;color:#dc2626;border:1px solid #fecaca;">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">

        <div class="mb-4">
          <label class="block text-xs font-medium mb-1.5" for="email"
                 style="color:var(--text-secondary);">Email Address</label>
          <input id="email" name="email" type="email"
                 placeholder="you@email.com" required
                 class="w-full text-sm px-3 py-2.5 rounded-lg outline-none"
                 style="background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);"
                 onfocus="this.style.borderColor='#2563eb'"
                 onblur="this.style.borderColor='var(--border)'"/>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-medium mb-1.5" for="password"
                 style="color:var(--text-secondary);">Password</label>
          <input id="password" name="password" type="password"
                 placeholder="Enter your password" required
                 class="w-full text-sm px-3 py-2.5 rounded-lg outline-none"
                 style="background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);"
                 onfocus="this.style.borderColor='#2563eb'"
                 onblur="this.style.borderColor='var(--border)'"/>
        </div>

        <button type="submit"
                class="w-full text-sm font-semibold text-white py-2.5 rounded-lg transition-colors"
                style="background:#2563eb;"
                onmouseover="this.style.background='#1d4ed8'"
                onmouseout="this.style.background='#2563eb'">
          Sign In
        </button>

        <p class="text-center text-sm mt-5" style="color:var(--text-secondary);">
          Don't have an account? 
          <a href="/customer/register" class="font-medium transition-colors" style="color:#2563eb;" onmouseover="this.style.color='#1d4ed8'" onmouseout="this.style.color='#2563eb'">Sign up here</a>
        </p>

      </form>

    </div>

    <p class="text-center text-xs mt-6" style="color:var(--text-secondary);opacity:0.5;">
      © 2026 QuickRent
    </p>

  </div>

</body>
</html>
